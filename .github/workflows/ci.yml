name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.2
        with:
          version: "0.9.5"

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run type checking
        run: uv run mypy skills/unity-cli/scripts tests

      - name: Run tests
        run: uv run pytest

      - name: Validate schema, links, generation, and skill structure
        run: uv run python -m scripts.validate_generated

      - name: Validate Agent Skills specification
        run: uv run skills-ref validate skills/unity-cli

      - name: Verify generated files are current and idempotent
        run: |
          uv run python -m scripts.generate_references skills/unity-cli/data/command-tree.json --output skills/unity-cli/references
          uv run python -m scripts.generate_references skills/unity-cli/data/command-tree.json --output skills/unity-cli/references
          git diff --exit-code -- skills/unity-cli/data skills/unity-cli/references

      - name: Verify Skills CLI discovery
        run: |
          npx skills add . --list | tee /tmp/unity-cli-skills-list.txt
          uv run python -m scripts.validate_generated --skills-list /tmp/unity-cli-skills-list.txt

      - name: Verify temporary local installation
        run: |
          target="${RUNNER_TEMP}/unity-cli-install-target"
          mkdir -p "$target"
          cd "$target"
          npx skills add "$GITHUB_WORKSPACE" --skill unity-cli --agent codex --yes
          test -f "$target/.agents/skills/unity-cli/SKILL.md"
          test -d "$target/.agents/skills/unity-cli/references"
          test -d "$target/.agents/skills/unity-cli/scripts"
          test -d "$target/.agents/skills/unity-cli/data"
